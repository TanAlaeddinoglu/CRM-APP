version: "3.9"

services:
  db:
    image: postgres:15
    container_name: crm_dev_db
    restart: unless-stopped
    env_file:
      - db.env.dev
    volumes:
      - crm_dev_postgres_data:/var/lib/postgresql/data
    networks:
      - crm_dev_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: crm_dev_backend
    restart: unless-stopped
    env_file:
      - .env.dev
    depends_on:
      - db
    networks:
      - crm_dev_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    # IMPORTANT:
    # Gunicorn is started via entrypoint.dev.sh
    # DO NOT override command here

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE_URL: /api
    container_name: crm_dev_frontend
    restart: "no"
    volumes:
      - crm_dev_frontend_dist:/usr/share/nginx/html
    networks:
      - crm_dev_net
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  nginx:
    image: nginx:1.27-alpine
    container_name: crm_dev_nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:8082:80"   # DEV only, not public
    volumes:
      - ./nginx/default-dev.conf:/etc/nginx/conf.d/default.conf:ro
      - crm_dev_frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
      - frontend
    networks:
      - crm_dev_net
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

networks:
  crm_dev_net:
    driver: bridge
    internal: true

volumes:
  crm_dev_postgres_data:
  crm_dev_frontend_dist:
