version: "3.9"

services:
  db:
    image: postgres:15
    container_name: crm_db
    restart: unless-stopped
    env_file:
      - ./db.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.local.backend
    container_name: crm_backend
    command: python manage.py runserver 0.0.0.0:8000
    restart: unless-stopped
    env_file:
      - ./.env
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.local.frontend
    container_name: crm_frontend
    command: npm run dev -- --host
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend


volumes:
  postgres_data:
