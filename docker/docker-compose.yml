name: CRM-local

x-backend-common: &backend-common
  build:
    context: ..
    dockerfile: docker/Dockerfile.local
    target: backend
  restart: unless-stopped
  init: true
  env_file:
    - ../.env
  volumes:
    - ../:/app

x-celery-worker-common: &celery-worker-common
  <<: *backend-common
  command:
    - /bin/sh
    - -c
    - exec celery -A djangoCRM worker --loglevel=info --concurrency="$${CELERY_WORKER_CONCURRENCY:-1}"
  profiles: ["celery"]
  depends_on:
    rabbitmq:
      condition: service_healthy
    redis:
      condition: service_healthy
    db:
      condition: service_healthy

services:
  db:
    image: postgres:15
    container_name: crm_db
    restart: unless-stopped
    env_file:
      - ../db.env
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: crm_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-crm_user}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-crm_password}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7.4-alpine
    container_name: crm_redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-change_me}
    command:
      - /bin/sh
      - -c
      - exec redis-server --appendonly yes --save 60 1000 --requirepass "$$REDIS_PASSWORD"
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD-SHELL", 'redis-cli -a "$$REDIS_PASSWORD" ping | grep PONG']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    <<: *backend-common
    container_name: crm_backend
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy

  celery_worker:
    <<: *celery-worker-common

  flower:
    <<: *backend-common
    container_name: crm_flower
    command:
      - /bin/sh
      - -c
      - exec celery -A djangoCRM flower --address=0.0.0.0 --port="$${FLOWER_PORT:-5555}" --basic_auth="$${FLOWER_BASIC_AUTH}"
    profiles: ["celery"]
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:${FLOWER_PORT:-5555}:5555"

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.local
      target: frontend
    container_name: crm_frontend
    restart: unless-stopped
    working_dir: /app
    environment:
      VITE_DEV_PROXY_TARGET: http://backend:8000
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "127.0.0.1:5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  frontend_node_modules:
  rabbitmq_data:
  redis_data:
