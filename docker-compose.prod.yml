name: djangocrm

x-backend-common: &backend-common
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped
  init: true
  env_file:
    - .env
  volumes:
    - crm_static_volume:/app/staticfiles
    - crm_media_volume:/app/media
  networks:
    - crm_private
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "5"

services:
  db:
    image: postgres:15
    container_name: crm_db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - crm_postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - crm_private
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 30s

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: crm_rabbitmq
    restart: unless-stopped
    env_file:
      - .env
    command:
      - /bin/sh
      - -c
      - |
        printf '%s\n' 'management.path_prefix = /rabbitmq' > /etc/rabbitmq/rabbitmq.conf
        exec docker-entrypoint.sh rabbitmq-server
    volumes:
      - crm_rabbitmq_data:/var/lib/rabbitmq
    networks:
      - crm_private
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 60s

  redis:
    image: redis:7.4-alpine
    container_name: crm_redis
    restart: unless-stopped
    env_file:
      - .env
    command:
      - /bin/sh
      - -c
      - exec redis-server --appendonly yes --save 60 1000 --requirepass "$$REDIS_PASSWORD"
    volumes:
      - crm_redis_data:/data
    networks:
      - crm_private
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", 'redis-cli -a "$$REDIS_PASSWORD" ping | grep PONG']
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 30s

  backend:
    <<: *backend-common
    container_name: crm_backend
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    <<: *backend-common
    container_name: crm_celery_worker
    command:
      - celery
      - -A
      - djangoCRM
      - worker
      - --loglevel=info
      - --concurrency=${CELERY_WORKER_CONCURRENCY:-1}
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  flower:
    <<: *backend-common
    container_name: crm_flower
    command:
      - celery
      - -A
      - djangoCRM
      - flower
      - --address=0.0.0.0
      - --port=5555
      - --url_prefix=flower
      - --basic_auth=${FLOWER_BASIC_AUTH}
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  collectstatic:
    <<: *backend-common
    container_name: crm_collectstatic
    restart: "no"
    command:
      - python
      - manage.py
      - collectstatic
      - --noinput
    depends_on:
      db:
        condition: service_healthy
    profiles: ["ops"]

  migrate:
    <<: *backend-common
    container_name: crm_migrate
    restart: "no"
    command:
      - python
      - manage.py
      - migrate
      - --noinput
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles: ["ops"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE_URL: /api
    container_name: crm_frontend
    restart: unless-stopped
    volumes:
      - crm_frontend_dist:/usr/share/nginx/html
    networks:
      - crm_private
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  nginx:
    image: nginx:1.27-alpine
    container_name: crm_nginx
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - crm_frontend_dist:/usr/share/nginx/html:ro
      - crm_static_volume:/static:ro
      - crm_media_volume:/media:ro
    depends_on:
      - backend
      - frontend
    networks:
      - crm_private
      - crm_public
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

networks:
  crm_private:
    driver: bridge
    internal: true
  crm_public:
    driver: bridge

volumes:
  crm_postgres_data:
    name: djangocrm_crm_postgres_data
  crm_frontend_dist:
    name: djangocrm_frontend_dist
  crm_static_volume:
    name: djangocrm_static_volume
  crm_media_volume:
    name: djangocrm_media_volume
  crm_rabbitmq_data:
    name: djangocrm_rabbitmq_data
  crm_redis_data:
    name: djangocrm_redis_data
