version: "3.9"

services:

  db:
    image: postgres:15
    container_name: crm_db
    restart: unless-stopped
    env_file:
      - ./db.env
    volumes:
      - crm_postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"   # sadece localhost (istersen tamamen kaldır)

  backend:
    build: .
    container_name: crm_backend
    command: gunicorn djangoCRM.wsgi:application --bind 0.0.0.0:8000
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE_URL: /
    container_name: crm_frontend
    restart: "no"
    volumes:
      - frontend_dist:/usr/share/nginx/html

  nginx:
    image: nginx:1.27-alpine
    container_name: crm_nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
      - frontend

volumes:
  crm_postgres_data:
  frontend_dist:
