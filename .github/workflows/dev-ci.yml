name: ci/dev

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

jobs:
  backend-ci:
    name: Django Backend CI
    runs-on: ubuntu-latest

    env:
      DJANGO_SETTINGS_MODULE: djangoCRM.settings_test
      PYTHONUNBUFFERED: 1

    steps:
      # 1️⃣ Kaynağı al
      - name: Checkout source code
        uses: actions/checkout@v4

      # 2️⃣ Python ortamı
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 3️⃣ Dependency'ler
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      # 4️⃣ Django config kontrolü (test settings)
      - name: Django system checks
        run: |
          python manage.py check --settings=djangoCRM.settings_test

      # 5️⃣ Testleri çalıştır (in-memory DB)
      - name: Run tests
        run: |
          pytest
